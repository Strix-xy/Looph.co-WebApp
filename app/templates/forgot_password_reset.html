{% extends "base.html" %}
{% block title %}Reset Password - Looph{% endblock %}

{% block extra_css %}
<style>
  .auth-container {
    min-height: calc(100vh - 100px);
    display: flex; justify-content: center; align-items: center; padding: 2rem;
  }
  .auth-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-color);
    padding: 4rem; max-width: 500px; width: 100%;
  }
  .auth-header { text-align: center; margin-bottom: 2.5rem; }
  .auth-header h1 {
    font-family: "Cinzel", serif; font-size: 2rem;
    letter-spacing: 4px; margin-bottom: 0.5rem;
  }
  .auth-header p { color: var(--text-gray); font-size: 0.88rem; letter-spacing: 1px; }
  .error-msg {
    background: rgba(255,68,68,0.1); border: 1px solid #ff4444;
    color: #ff4444; padding: 1rem; margin-bottom: 1.5rem;
    text-align: center; font-size: 0.85rem; letter-spacing: 1px;
  }
  .mismatch-warning {
    color: #ff4444; font-size: 0.75rem; letter-spacing: 1px;
    margin-top: 5px; display: none;
  }
  .input-error { border-color: #ff4444 !important; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <h1>RESET PASSWORD</h1>
      <p>Enter your new password below.</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.forgot_password_reset') }}" id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <div style="position:relative;">
          <input type="password" name="new_password" id="new_password"
            required minlength="6" placeholder="Minimum 6 characters"
            autocomplete="new-password" style="padding-right:45px;" />
          <button type="button" onclick="togglePwd('new_password',this)"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-gray);cursor:pointer;font-size:0.8rem;">
            Show
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <div style="position:relative;">
          <input type="password" name="confirm_password" id="confirm_password"
            required placeholder="Re-enter your new password"
            autocomplete="new-password" style="padding-right:45px;" />
          <button type="button" onclick="togglePwd('confirm_password',this)"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-gray);cursor:pointer;font-size:0.8rem;">
            Show
          </button>
        </div>
        <span id="matchWarning" class="mismatch-warning">PASSWORDS DO NOT MATCH</span>
      </div>

      <button type="submit" class="btn" style="width:100%;">RESET PASSWORD</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
  }
  const newPwd = document.getElementById('new_password');
  const confirmPwd = document.getElementById('confirm_password');
  const warning = document.getElementById('matchWarning');

  function checkMatch() {
    if (!confirmPwd.value) { warning.style.display = 'none'; confirmPwd.classList.remove('input-error'); return; }
    if (newPwd.value !== confirmPwd.value) {
      warning.style.display = 'block'; confirmPwd.classList.add('input-error');
    } else {
      warning.style.display = 'none'; confirmPwd.classList.remove('input-error');
    }
  }
  newPwd.addEventListener('keyup', checkMatch);
  confirmPwd.addEventListener('keyup', checkMatch);
  document.getElementById('resetForm').addEventListener('submit', function(e) {
    if (newPwd.value !== confirmPwd.value) { e.preventDefault(); confirmPwd.focus(); }
  });
</script>
{% endblock %}
