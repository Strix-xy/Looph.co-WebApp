{% extends "base.html" %} {% block title %}Edit Profile - Looph.co{% endblock %} {% block content %}
<div class="profile-edit-page">
  <div class="profile-edit-center">
    <h1 class="profile-edit-title">Edit profile</h1>
    <div class="card profile-edit-card">
      {% if error %}<p class="profile-edit-error">{{ error }}</p>{% endif %}
      <form method="POST" action="{{ url_for('customer.edit_profile') }}">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" value="{{ user.full_name or '' }}" required />
        </div>
        <div class="form-group">
          <label>Phone Number (09XXXXXXXXX or +639XXXXXXXXX)</label>
          <input type="tel" name="phone_number" value="{{ display_phone or user.phone_number or '' }}" placeholder="09XXXXXXXXX" required />
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="address" rows="3" required>{{ display_address or user.address or '' }}</textarea>
        </div>
        <div class="form-group">
          <label>Default Payment Method</label>
          <select name="default_payment_method">
            <option value="" {% if not user.default_payment_method %}selected{% endif %}>None</option>
            <option value="gcash" {% if user.default_payment_method == 'gcash' %}selected{% endif %}>GCash</option>
            <option value="cod" {% if user.default_payment_method == 'cod' %}selected{% endif %}>Cash on Delivery</option>
          </select>
        </div>
        <button type="submit" class="btn btn-block">Save changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
