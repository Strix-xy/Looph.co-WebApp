{% extends "base.html" %} {% block title %}Login - Looph{% endblock %} {% block extra_css %}
<style>
  .auth-container {
    min-height: calc(100vh - 100px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .auth-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    padding: 4rem;
    max-width: 500px;
    width: 100%;
    position: relative;
  }

  .auth-box::before {
    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(
      45deg,
      transparent,
      rgba(255, 255, 255, 0.1),
      transparent
    );
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .auth-box:hover::before {
    opacity: 1;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .auth-header h1 {
    font-family: "Cinzel", serif;
    font-size: 2.5rem;
    letter-spacing: 4px;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
  }

  .auth-header p {
    color: var(--text-gray);
    letter-spacing: 2px;
    font-size: 0.9rem;
  }

  .error-message {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid #ff4444;
    color: #ff4444;
    padding: 1rem;
    margin-bottom: 2rem;
    text-align: center;
    letter-spacing: 1px;
  }

  .auth-footer {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-color);
  }

  .auth-footer a {
    color: var(--text-white);
    text-decoration: none;
    letter-spacing: 1px;
    transition: all 0.3s ease;
  }

  .auth-footer a:hover {
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }
</style>
{% endblock %} {% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <h1>LOGIN</h1>
      <p>Sign back in to Looph</p>
    </div>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div style="position: relative">
          <input
            type="password"
            name="password"
            id="password"
            required
            autocomplete="current-password"
            style="padding-right: 45px"
          />
          <button
            type="button"
            onclick="togglePassword()"
            style="
              position: absolute;
              right: 10px;
              top: 50%;
              transform: translateY(-50%);
              background: transparent;
              border: none;
              color: var(--text-gray);
              cursor: pointer;
              font-size: 0.9rem;
              padding: 5px;
            "
            id="togglePasswordBtn"
          >
            Show
          </button>
        </div>
      </div>

      <button type="submit" class="btn" style="width: 100%">LOGIN</button>
    </form>

    <div class="auth-footer">
      <p style="color: var(--text-gray); margin-bottom: 0.5rem">
        Don't have an account?
      </p>
      <a href="{{ url_for('auth.register') }}">Create Account</a>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleBtn = document.getElementById("togglePasswordBtn");

    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      toggleBtn.textContent = "Hide";
    } else {
      passwordInput.type = "password";
      toggleBtn.textContent = "Show";
    }
  }
</script>
{% endblock %}
